<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zauri System</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#000;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
padding:40px;
border-radius:18px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

button{
padding:12px 22px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7f00ff,#00c6ff);
color:white;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<canvas id="p"></canvas>

<div class="center">
  <div class="card">
      <h1>🔐 Zauri System</h1>
          <p>Acceso de verificación seguro</p>
              <a href="/login"><button>Log In (Discord)</button></a>
                </div>
                </div>

                <script src="/particles.js"></script>

                </body>
</html>
