<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zauri</title>

<style>
:root{
  --bg:#050510;
    --panel:#0d0d1a;
      --neon:#7c3aed;
        --blue:#00f0ff;
          --text:#e5e7eb;
          }

          body{
            margin:0;
              font-family:sans-serif;
                background:#050510;
                  color:var(--text);
                  }

                  /* LOADER */
                  #loader{
                    position:fixed;
                      width:100%;
                        height:100%;
                          background:#050510;
                            display:flex;
                              justify-content:center;
                                align-items:center;
                                  z-index:999;
                                  }

                                  .spinner{
                                    width:50px;
                                      height:50px;
                                        border:4px solid #7c3aed;
                                          border-top:4px solid #00f0ff;
                                            border-radius:50%;
                                              animation:spin 1s linear infinite;
                                              }

                                              @keyframes spin{
                                                to{ transform:rotate(360deg); }
                                                }

                                                /* NAV */
                                                .nav{
                                                  position:sticky;
                                                    top:0;
                                                      backdrop-filter:blur(10px);
                                                        background:rgba(5,5,16,0.6);
                                                          display:flex;
                                                            justify-content:space-between;
                                                              padding:15px 30px;
                                                              }

                                                              .logo{color:var(--blue);font-weight:bold;}

                                                              .btn{
                                                                background:linear-gradient(45deg,var(--neon),var(--blue));
                                                                  border:none;
                                                                    padding:10px 18px;
                                                                      border-radius:10px;
                                                                        color:white;
                                                                          cursor:pointer;
                                                                          }

                                                                          /* HERO */
                                                                          .hero{text-align:center;margin-top:100px;}
                                                                          .hero h1{
                                                                            font-size:60px;
                                                                              background:linear-gradient(90deg,var(--neon),var(--blue));
                                                                                -webkit-background-clip:text;
                                                                                  -webkit-text-fill-color:transparent;
                                                                                  }

                                                                                  /* STATS */
                                                                                  .stats{
                                                                                    display:flex;
                                                                                      justify-content:center;
                                                                                        gap:40px;
                                                                                          margin-top:40px;
                                                                                          }

                                                                                          /* PREVIEW */
                                                                                          .preview{
                                                                                            margin-top:80px;
                                                                                              display:flex;
                                                                                                justify-content:center;
                                                                                                }

                                                                                                .preview-box{
                                                                                                  width:700px;
                                                                                                    height:350px;
                                                                                                      background:var(--panel);
                                                                                                        border-radius:20px;
                                                                                                          display:flex;
                                                                                                            justify-content:center;
                                                                                                              align-items:center;
                                                                                                              }

                                                                                                              /* CARDS */
                                                                                                              .grid{
                                                                                                                display:flex;
                                                                                                                  justify-content:center;
                                                                                                                    flex-wrap:wrap;
                                                                                                                      gap:30px;
                                                                                                                        margin-top:80px;
                                                                                                                        }

                                                                                                                        .card{
                                                                                                                          width:240px;
                                                                                                                            padding:20px;
                                                                                                                              background:var(--panel);
                                                                                                                                border-radius:15px;
                                                                                                                                  transition:0.3s;
                                                                                                                                  }

                                                                                                                                  .card:hover{
                                                                                                                                    transform:translateY(-10px);
                                                                                                                                      box-shadow:0 0 20px var(--neon);
                                                                                                                                      }

                                                                                                                                      /* FOOTER */
                                                                                                                                      .footer{
                                                                                                                                        text-align:center;
                                                                                                                                          margin-top:120px;
                                                                                                                                            padding:20px;
                                                                                                                                              opacity:0.6;
                                                                                                                                              }
                                                                                                                                              </style>
                                                                                                                                              </head>

                                                                                                                                              <body>

                                                                                                                                              <div id="loader"><div class="spinner"></div></div>

                                                                                                                                              <div class="nav">
                                                                                                                                                <div class="logo">Zauri</div>
                                                                                                                                                  <button class="btn" onclick="login()" id="loginBtn">Login</button>
                                                                                                                                                  </div>

                                                                                                                                                  <div class="hero">
                                                                                                                                                    <h1 id="title"></h1>
                                                                                                                                                      <p id="desc"></p>
                                                                                                                                                        <button class="btn" onclick="login()" id="startBtn"></button>

                                                                                                                                                          <div class="stats">
                                                                                                                                                              <div>
                                                                                                                                                                    <h2 id="serversCount">0</h2>
                                                                                                                                                                          <p>Servidores</p>
                                                                                                                                                                              </div>
                                                                                                                                                                                  <div>
                                                                                                                                                                                        <h2>24/7</h2>
                                                                                                                                                                                              <p>Activo</p>
                                                                                                                                                                                                  </div>
                                                                                                                                                                                                    </div>
                                                                                                                                                                                                    </div>

                                                                                                                                                                                                    <div class="preview">
                                                                                                                                                                                                      <div class="preview-box">Dashboard Preview</div>
                                                                                                                                                                                                      </div>

                                                                                                                                                                                                      <div class="grid">
                                                                                                                                                                                                        <div class="card"><h3 id="welcome"></h3><p id="welcomeDesc"></p></div>
                                                                                                                                                                                                          <div class="card"><h3 id="mod"></h3><p id="modDesc"></p></div>
                                                                                                                                                                                                            <div class="card"><h3 id="tickets"></h3><p id="ticketsDesc"></p></div>
                                                                                                                                                                                                              <div class="card"><h3 id="config"></h3><p id="configDesc"></p></div>
                                                                                                                                                                                                              </div>

                                                                                                                                                                                                              <div class="footer">
                                                                                                                                                                                                                <p><strong>Zauri Bot®</strong></p>
                                                                                                                                                                                                                  <p>Fecha de creación: 01/05/26</p>
                                                                                                                                                                                                                    <p>Dev: Angel</p>
                                                                                                                                                                                                                      <p>V1.0.0</p>
                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                      <script src="/lang.js"></script>

                                                                                                                                                                                                                      <script>
                                                                                                                                                                                                                      function login(){location.href="/login";}

                                                                                                                                                                                                                      // loader
                                                                                                                                                                                                                      window.onload=()=>document.getElementById("loader").style.display="none";

                                                                                                                                                                                                                      // stats reales
                                                                                                                                                                                                                      async function loadStats(){
                                                                                                                                                                                                                        const res=await fetch("/api/stats");
                                                                                                                                                                                                                          const data=await res.json();
