<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #0a0a0f;
      color: #fff;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #0d0d14;
      border-right: 1px solid rgba(138, 43, 226, 0.2);
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #9b5cff;
      text-shadow: 0 0 10px #9b5cff;
    }

    .menu a {
      display: block;
      padding: 12px;
      margin-bottom: 10px;
      color: #ccc;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
      cursor: pointer;
    }

    .menu a:hover {
      background: rgba(155, 92, 255, 0.15);
      color: #fff;
      box-shadow: 0 0 10px #9b5cff;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar h1 {
      font-size: 22px;
      color: #00eaff;
      text-shadow: 0 0 8px #00eaff;
      margin-bottom: 20px;
    }

    /* Sections */
    .section {
      display: none;
    }

    .active {
      display: block;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #12121a;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(0, 234, 255, 0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px #00eaff, 0 0 10px #9b5cff;
    }

    .card h2 {
      margin-bottom: 10px;
      color: #9b5cff;
    }

    .card p {
      color: #aaa;
      font-size: 14px;
    }

    /* Fake toggle */
    .toggle {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #1a1a25;
      border: 1px solid #333;
      cursor: pointer;
      text-align: center;
    }

    .toggle.active {
      background: #00eaff;
      color: black;
      box-shadow: 0 0 10px #00eaff;
    }

  </style>
</head>

<body>

  <div class="sidebar">
    <div class="logo">NeonPanel</div>

    <div class="menu">
      <a onclick="showSection('dashboard')">Dashboard</a>
      <a onclick="showSection('servers')">Servers</a>
      <a onclick="showSection('commands')">Commands</a>
      <a onclick="showSection('settings')">Settings</a>
    </div>
  </div>

  <div class="main">
    
    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">
      <div class="topbar"><h1>Dashboard</h1></div>

      <div class="cards">
        <div class="card">
          <h2>Usuarios</h2>
          <p id="users">123</p>
        </div>

        <div class="card">
          <h2>Comandos usados</h2>
          <p id="commandsCount">456</p>
        </div>

        <div class="card">
          <h2>Servidores</h2>
          <p>3</p>
        </div>
      </div>
    </div>

    <!-- SERVERS -->
    <div id="servers" class="section">
      <div class="topbar"><h1>Servers</h1></div>

      <div class="card">
        <h2>Mi servidor</h2>
        <p>Configuración básica</p>
      </div>
    </div>

    <!-- COMMANDS -->
    <div id="commands" class="section">
      <div class="topbar"><h1>Commands</h1></div>

      <div class="card">
        <h2>Comando !ping</h2>
        <div class="toggle" onclick="toggle(this)">Activar / Desactivar</div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="section">
      <div class="topbar"><h1>Settings</h1></div>

      <div class="card">
        <h2>Configuración</h2>
        <p>Aquí irían opciones reales</p>
      </div>
    </div>

  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
    }

    function toggle(el) {
      el.classList.toggle("active");
    }

    // Fake data animación
    setInterval(() => {
      document.getElementById("users").innerText =
        Math.floor(Math.random() * 200);

      document.getElementById("commandsCount").innerText =
        Math.floor(Math.random() * 1000);
    }, 2000);
  </script>

</body>
</html>
